<!DOCTYPE html>
<html lang="en" class="transition-colors duration-500">

<head>
    <meta charset="UTF-8">
    <title>Examify - Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: "#7C3AED"
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ffffff, #eef2ff, #f5f3ff, #e0f2fe);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .dark body {
            background: #0F172A;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body class="text-slate-800 dark:text-white min-h-screen relative transition-colors duration-500">

    <!-- Theme Toggle -->
    <button id="themeToggle"
        class="fixed top-5 right-5 z-50 px-3 py-1 border border-primary rounded-lg hover:bg-primary hover:text-white transition bg-white/70 dark:bg-slate-800/70 backdrop-blur">
        🌓
    </button>

    <!-- Particles -->
    <div id="tsparticles" class="fixed inset-0 -z-10"></div>

    <!-- Center Wrapper -->
    <div class="min-h-screen flex items-center justify-center px-4 py-20">

        <!-- Card -->
        <div
            class="bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-2xl rounded-2xl p-10 w-full max-w-md border border-purple-100 dark:border-slate-700 transition-colors duration-500">

            <h2 class="text-3xl font-extrabold text-center text-primary mb-8">
                Welcome Back
            </h2>

            <form id="loginForm" class="space-y-5">

                <!-- Email -->
                <div>
                    <label class="block mb-1 font-semibold">Email</label>
                    <input type="email" id="email"
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                </div>

                <!-- Password -->
                <div>
                    <label class="block mb-1 font-semibold">Password</label>
                    <div class="relative">
                        <input type="password" id="password"
                            class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                        <button type="button" id="togglePassword"
                            class="absolute right-3 top-2 text-slate-500 dark:text-slate-400 text-sm">
                            Show
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center justify-between text-sm">
                    <label class="flex items-center space-x-2">
                        <input type="checkbox" id="rememberMe">
                        <span>Remember Me</span>
                    </label>
                </div>

                <!-- Error Message -->
                <p id="errorMessage"
                    class="text-red-500 text-center font-semibold opacity-0 transition-all duration-300">
                </p>

                <!-- Login Button -->
                <button type="submit"
                    class="w-full py-3 bg-primary text-white font-semibold rounded-lg shadow-md hover:opacity-90 transition">
                    Login
                </button>

            </form>
        </div>
    </div>

    <script>
        // ===============================
        // Apply Saved Theme
        // ===============================
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.documentElement.classList.add("dark");
        }

        const toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        };

        document.getElementById("themeToggle")
            .addEventListener("click", toggleTheme);

        // ===============================
        // Route Guard (UNCHANGED)
        // ===============================
        const users = JSON.parse(localStorage.getItem("examifyUsers"));
        if (!users || users.length === 0) {
            window.location.replace("register.html");
        }

        // ===============================
        // Particles
        // ===============================
        const getParticleCount = () => window.innerWidth < 768 ? 15 : 40;

        let particleInstance;

        tsParticles.load("tsparticles", {
            particles: {
                number: { value: getParticleCount() },
                color: { value: "#7C3AED" },
                links: { enable: true, color: "#7C3AED", opacity: 0.2 },
                move: { enable: true, speed: 0.5 },
                size: { value: 2 }
            }
        }).then(container => {
            particleInstance = container;
        });

        // Update particles on resize
        window.addEventListener("resize", () => {
            if (!particleInstance) return;

            const newCount = getParticleCount();
            particleInstance.options.particles.number.value = newCount;
            particleInstance.refresh();
        });
        // ===============================
        // YOUR ORIGINAL LOGIC (UNCHANGED)
        // ===============================
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const errorMessage = document.getElementById("errorMessage");
        const togglePassword = document.getElementById("togglePassword");
        const rememberMe = document.getElementById("rememberMe");

        let failedAttempts = 0;
        let lockTimeout = null;

        const remembered = localStorage.getItem("rememberedUser");
        if (remembered) {
            emailInput.value = remembered;
            rememberMe.checked = true;
        }

        togglePassword.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                togglePassword.textContent = "Hide";
            } else {
                passwordInput.type = "password";
                togglePassword.textContent = "Show";
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove("opacity-0");
            errorMessage.classList.add("animate-pulse");
        }

        function clearError() {
            errorMessage.classList.add("opacity-0");
            errorMessage.classList.remove("animate-pulse");
        }

        function lockLogin() {
            let seconds = 30;
            emailInput.disabled = true;
            passwordInput.disabled = true;

            lockTimeout = setInterval(() => {
                showError(`Too many attempts. Try again in ${seconds}s`);
                seconds--;

                if (seconds < 0) {
                    clearInterval(lockTimeout);
                    emailInput.disabled = false;
                    passwordInput.disabled = false;
                    failedAttempts = 0;
                    clearError();
                }
            }, 1000);
        }

        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();
            clearError();

            if (!emailInput.value || !passwordInput.value) {
                showError("All fields are required.");
                return;
            }

            const user = users.find(
                u => u.email === emailInput.value.trim() &&
                    u.password === passwordInput.value
            );

            if (!user) {
                failedAttempts++;
                showError("Invalid email or password.");

                if (failedAttempts >= 3) {
                    lockLogin();
                }
                return;
            }

            if (rememberMe.checked) {
                localStorage.setItem("rememberedUser", emailInput.value.trim());
            } else {
                localStorage.removeItem("rememberedUser");
            }

            localStorage.setItem("currentUser", JSON.stringify(user));

            window.location.replace("dashboard.html");
        });
    </script>

</body>

</html>
