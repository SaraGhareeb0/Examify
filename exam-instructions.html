<!DOCTYPE html>
<html lang="en" class="transition-colors duration-500">

<head>
    <meta charset="UTF-8">
    <title>Examify - Exam Instructions</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Fonts & Tailwind -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: "#7C3AED",
                        secondary: "#1F2937",
                        pageBg: "#DCDCDC",
                        sectionBg: "#FFFFFF",
                        cardBg: "#F8FBFF",
                        accent: "#EDF4FF",
                        textSecondary: "#6B7280",
                        danger: "#EF4444"
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ffffff, #eef2ff, #f5f3ff, #e0f2fe);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
        }

        .dark body {
            background: #0F172A;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body
    class="text-secondary dark:text-white min-h-screen flex items-center justify-center transition-colors duration-500">

    <!-- Theme Toggle -->
    <button id="themeToggle"
        class="fixed top-5 right-5 z-50 px-3 py-1 border border-primary rounded-lg hover:bg-primary hover:text-white transition bg-white/70 dark:bg-slate-800/70 backdrop-blur">
        🌓
    </button>

    <!-- Particles -->
    <div id="tsparticles" class="fixed inset-0 -z-10"></div>

    <div
        class="bg-cardBg dark:bg-slate-800/80 backdrop-blur-xl p-10 rounded-3xl shadow-xl max-w-2xl w-full border border-gray-200 dark:border-slate-700 transition-colors duration-500">

        <h1 class="text-3xl font-extrabold text-primary mb-6 dark:text-slate-100 ">Exam Instructions</h1>

        <!-- Welcome -->
        <p class="text-textSecondary dark:text-slate-300 mb-6" id="welcomeUser">Welcome, Student 👋</p>

        <!-- Exam Rules Card -->
        <div
            class="bg-sectionBg dark:bg-slate-900/80 backdrop-blur-xl p-6 rounded-2xl shadow-lg border border-gray-200 dark:border-slate-700 mb-6 transition-colors duration-500">
            <h2 class="text-xl font-bold mb-4 text-secondary dark:text-white">Exam Rules</h2>
            <ul class="list-disc list-inside space-y-2 text-textSecondary dark:text-slate-300">
                <li>Duration: <span id="examDuration">30 minutes</span></li>
                <li>Number of Questions: <span id="examQuestions">20</span></li>
                <li>No tab switching allowed during exam.</li>
                <li>Exam will auto-submit when time expires.</li>
            </ul>
        </div>

        <!-- Countdown Preview -->
        <div
            class="bg-accent dark:bg-slate-700/70 backdrop-blur-xl p-4 rounded-xl mb-6 text-center transition-colors duration-500">
            <p class="text-lg font-semibold">Exam will start in:</p>
            <p id="countdown" class="text-3xl font-bold text-primary mt-2">5</p>
        </div>

        <!-- Start Button -->
        <div class="text-center">
            <button id="startExamBtn"
                class="py-3 px-6 bg-primary text-white rounded-xl font-semibold hover:opacity-90 transition shadow-md disabled:opacity-50"
                disabled>
                Start Exam
            </button>
        </div>

    </div>

    <script>
        // ===============================
        // Apply Saved Theme
        // ===============================
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.documentElement.classList.add("dark");
        }

        const toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        };
        document.getElementById("themeToggle").addEventListener("click", toggleTheme);

        // ===============================
        // Particles
        // ===============================
        const getParticleCount = () => window.innerWidth < 768 ? 15 : 40;

        let particleInstance;

        tsParticles.load("tsparticles", {
            particles: {
                number: { value: getParticleCount() },
                color: { value: "#7C3AED" },
                links: { enable: true, color: "#7C3AED", opacity: 0.2 },
                move: { enable: true, speed: 0.5 },
                size: { value: 2 }
            }
        }).then(container => {
            particleInstance = container;
        });

        // Update particles on resize
        window.addEventListener("resize", () => {
            if (!particleInstance) return;

            const newCount = getParticleCount();
            particleInstance.options.particles.number.value = newCount;
            particleInstance.refresh();
        });

        document.addEventListener("DOMContentLoaded", () => {

            // ===== Route Guard =====
            const currentUser = JSON.parse(localStorage.getItem("currentUser"));
            if (!currentUser) {
                window.location.replace("login.html");
            }

            const selectedExam = JSON.parse(localStorage.getItem("currentExam"));
            if (!selectedExam) {
                alert("No exam selected!");
                window.location.replace("dashboard.html");
            }

            // Display exam info dynamically
            document.getElementById("welcomeUser").textContent = `Welcome, ${currentUser.firstName} 👋`;
            document.getElementById("examDuration").textContent = selectedExam.duration;
            document.getElementById("examQuestions").textContent = selectedExam.questions.length;

            // ===== Countdown & Enable Start Button =====
            let countdownTime = 5; // seconds before enabling start
            const countdownEl = document.getElementById("countdown");
            const startBtn = document.getElementById("startExamBtn");

            const countdownInterval = setInterval(() => {
                countdownEl.textContent = countdownTime;
                countdownTime--;
                if (countdownTime < 0) {
                    clearInterval(countdownInterval);
                    countdownEl.textContent = "Ready!";
                    startBtn.disabled = false;
                }
            }, 1000);

            // ===== Simulate No Tab Switching =====
            let tabSwitchCount = 0;
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    tabSwitchCount++;
                    alert(`Tab switch detected! Attempts: ${tabSwitchCount}`);
                }
            });

            // ===== Start Exam Button =====
            startBtn.addEventListener("click", () => {
                // Save selected exam for currentUser in localStorage
                currentUser.currentExam = {
                    ...selectedExam,
                    startTime: new Date().getTime()
                };
                localStorage.setItem("currentUser", JSON.stringify(currentUser));

                // Redirect to actual exam page
                window.location.replace("exam.html");
            });

        });
    </script>

</body>

</html>
