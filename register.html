<!DOCTYPE html>
<html lang="en" class="transition-colors duration-500">

<head>
    <meta charset="UTF-8">
    <title>Examify - Register</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Poppins Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- tsParticles -->
    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: "#7C3AED"
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(-45deg, #ffffff, #eef2ff, #f5f3ff, #e0f2fe);
            background-size: 400% 400%;
            animation: gradientMove 15s ease infinite;
            overflow-x: hidden;
        }

        .dark body {
            background: #0F172A;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }
    </style>
</head>

<body
    class="text-slate-800 dark:text-white min-h-screen flex items-center justify-center relative overflow-hidden transition-colors duration-500">

    <!-- Theme Toggle -->
    <button id="themeToggle"
        class="fixed top-5 right-5 z-50 px-3 py-1 border border-primary rounded-lg hover:bg-primary hover:text-white transition bg-white/70 dark:bg-slate-800/70 backdrop-blur">
        🌓
    </button>

    <!-- Particles -->
    <div id="tsparticles" class="fixed inset-0 -z-10"></div>

    <!-- Register Card -->
    <div
        class=" bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-2xl rounded-2xl p-10 w-full max-w-md border border-purple-100 dark:border-slate-700 transition-colors duration-500">

        <h2 class="text-3xl font-extrabold text-center text-primary mb-8">
            Create Your Account
        </h2>

        <form id="registerForm" class="space-y-5">

            <div>
                <label class="block mb-1 font-semibold">First Name</label>
                <input type="text" id="firstName"
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                <p class="text-sm text-red-500 hidden" id="firstNameError"></p>
            </div>

            <div>
                <label class="block mb-1 font-semibold">Last Name</label>
                <input type="text" id="lastName"
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                <p class="text-sm text-red-500 hidden" id="lastNameError"></p>
            </div>

            <div>
                <label class="block mb-1 font-semibold">Email Address</label>
                <input type="email" id="email"
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                <p class="text-sm text-red-500 hidden" id="emailError"></p>
            </div>

            <div>
                <label class="block mb-1 font-semibold">Password</label>
                <div class="relative">
                    <input type="password" id="password"
                        class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                    <button type="button" id="togglePassword"
                        class="absolute right-3 top-2 text-slate-500 dark:text-slate-400 text-sm">Show</button>
                </div>
                <div class="h-2 bg-gray-300 dark:bg-slate-700 rounded mt-2">
                    <div id="strengthBar" class="h-2 rounded bg-red-500 w-0"></div>
                </div>
                <p class="text-sm text-red-500 hidden" id="passwordError"></p>
            </div>

            <div>
                <label class="block mb-1 font-semibold">Re-enter Password</label>
                <input type="password" id="confirmPassword"
                    class="w-full px-4 py-2 rounded-lg border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-800 focus:outline-none focus:ring-2 focus:ring-primary">
                <p class="text-sm text-red-500 hidden" id="confirmError"></p>
            </div>

            <button type="submit" id="submitBtn"
                class="w-full py-3 bg-primary text-white font-semibold rounded-lg shadow-md opacity-50 cursor-not-allowed transition"
                disabled>
                Register
            </button>

            <p id="successMessage"
                class="text-green-600 text-center font-semibold hidden transition-opacity duration-500">
                Registration Successful! Redirecting...
            </p>

        </form>
    </div>

    <script>
        // ===============================
        // Apply Saved Theme
        // ===============================
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme === "dark") {
            document.documentElement.classList.add("dark");
        }

        const toggleTheme = () => {
            const isDark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");
        };

        document.getElementById("themeToggle")
            .addEventListener("click", toggleTheme);

        // ===============================
        // Particles
        // ===============================
        const getParticleCount = () => window.innerWidth < 768 ? 15 : 40;

        let particleInstance;

        tsParticles.load("tsparticles", {
            particles: {
                number: { value: getParticleCount() },
                color: { value: "#7C3AED" },
                links: { enable: true, color: "#7C3AED", opacity: 0.2 },
                move: { enable: true, speed: 0.5 },
                size: { value: 2 }
            }
        }).then(container => {
            particleInstance = container;
        });

        // Update particles on resize
        window.addEventListener("resize", () => {
            if (!particleInstance) return;

            const newCount = getParticleCount();
            particleInstance.options.particles.number.value = newCount;
            particleInstance.refresh();
        });

        // ===============================
        // ORIGINAL LOGIC 
        // ===============================

        const firstName = document.getElementById("firstName");
        const lastName = document.getElementById("lastName");
        const email = document.getElementById("email");
        const password = document.getElementById("password");
        const confirmPassword = document.getElementById("confirmPassword");
        const submitBtn = document.getElementById("submitBtn");

        const firstNameError = document.getElementById("firstNameError");
        const lastNameError = document.getElementById("lastNameError");
        const emailError = document.getElementById("emailError");
        const passwordError = document.getElementById("passwordError");
        const confirmError = document.getElementById("confirmError");

        const strengthBar = document.getElementById("strengthBar");

        const nameRegex = /^[A-Za-z]+$/;
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        function showError(element, message) {
            element.textContent = message;
            element.classList.remove("hidden");
        }

        function hideError(element) {
            element.classList.add("hidden");
        }

        function validateFirstName() {
            if (!firstName.value.trim()) {
                showError(firstNameError, "First name is required.");
                return false;
            }
            if (!nameRegex.test(firstName.value.trim())) {
                showError(firstNameError, "Only alphabetical characters allowed.");
                return false;
            }
            hideError(firstNameError);
            return true;
        }

        function validateLastName() {
            if (!lastName.value.trim()) {
                showError(lastNameError, "Last name is required.");
                return false;
            }
            if (!nameRegex.test(lastName.value.trim())) {
                showError(lastNameError, "Only alphabetical characters allowed.");
                return false;
            }
            hideError(lastNameError);
            return true;
        }

        function validateEmail() {
            if (!email.value.trim()) {
                showError(emailError, "Email is required.");
                return false;
            }
            if (!emailRegex.test(email.value.trim())) {
                showError(emailError, "Enter a valid email address.");
                return false;
            }

            const users = JSON.parse(localStorage.getItem("examifyUsers")) || [];
            const exists = users.some(user => user.email === email.value.trim());

            if (exists) {
                showError(emailError, "Email already registered.");
                return false;
            }

            hideError(emailError);
            return true;
        }

        function validatePassword() {
            if (password.value.length < 8) {
                showError(passwordError, "Password must be at least 8 characters.");
                return false;
            }
            hideError(passwordError);
            return true;
        }

        function validateConfirmPassword() {
            if (!confirmPassword.value) {
                showError(confirmError, "Please re-enter your password.");
                return false;
            }
            if (confirmPassword.value !== password.value) {
                showError(confirmError, "Passwords do not match.");
                return false;
            }
            hideError(confirmError);
            return true;
        }

        function passwordStrength() {
            let strength = 0;

            if (password.value.length >= 8) strength++;
            if (/[A-Z]/.test(password.value)) strength++;
            if (/[0-9]/.test(password.value)) strength++;
            if (/[^A-Za-z0-9]/.test(password.value)) strength++;

            const widths = ["25%", "50%", "75%", "100%"];
            const colors = ["bg-red-500", "bg-yellow-500", "bg-blue-500", "bg-green-500"];

            strengthBar.style.width = widths[strength - 1] || "0%";
            strengthBar.className = "h-2 rounded " + (colors[strength - 1] || "bg-red-500");
        }

        function updateButtonState() {
            const isValid =
                validateFirstName() &&
                validateLastName() &&
                validateEmail() &&
                validatePassword() &&
                validateConfirmPassword();

            submitBtn.disabled = !isValid;
            submitBtn.classList.toggle("opacity-50", !isValid);
            submitBtn.classList.toggle("cursor-not-allowed", !isValid);
        }

        firstName.addEventListener("input", () => {
            validateFirstName();
            updateButtonState();
        });

        lastName.addEventListener("input", () => {
            validateLastName();
            updateButtonState();
        });

        email.addEventListener("input", () => {
            validateEmail();
            updateButtonState();
        });

        password.addEventListener("input", () => {
            validatePassword();
            validateConfirmPassword();
            passwordStrength();
            updateButtonState();
        });

        confirmPassword.addEventListener("input", () => {
            validateConfirmPassword();
            updateButtonState();
        });

        document.getElementById("togglePassword").addEventListener("click", function () {
            if (password.type === "password") {
                password.type = "text";
                this.textContent = "Hide";
            } else {
                password.type = "password";
                this.textContent = "Show";
            }
        });

        document.getElementById("registerForm").addEventListener("submit", function (e) {
            e.preventDefault();

            const users = JSON.parse(localStorage.getItem("examifyUsers")) || [];

            const newUser = {
                firstName: firstName.value.trim(),
                lastName: lastName.value.trim(),
                email: email.value.trim(),
                password: password.value
            };

            users.push(newUser);
            localStorage.setItem("examifyUsers", JSON.stringify(users));

            document.getElementById("successMessage").classList.remove("hidden");

            setTimeout(() => {
                window.location.replace("login.html");
            }, 4000);
        });
    </script>

</body>

</html>
